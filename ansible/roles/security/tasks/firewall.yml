---
- name: Install ufw
  apt:
    name: ufw
    state: present


- name: Allow SSH
  ufw:
    rule: allow
    name: OpenSSH


- name: Allow HTTP
  ufw:
    rule: allow
    port: 80
    proto: tcp


- name: Allow HTTPS
  ufw:
    rule: allow
    port: 443
    proto: tcp


- name: Enable firewall
  ufw:
    state: enabled