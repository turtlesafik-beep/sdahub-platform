- name: Create sdahub directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  loop:
  - "{{ sdahub_root }}"
  - "{{ sdahub_root }}/compose"
  - "{{ sdahub_root }}/configs"
  - "{{ sdahub_root }}/data"
  - "{{ sdahub_root }}/backups"
  - "{{ sdahub_root }}/scripts"